data:
  raw_dir: "../set-a"
  outcomes_file: "../Outcomes-a.txt"
  features_output: "outputs/features/features.parquet"

features:
  static_params: ["Age", "Gender", "Height", "Weight", "ICUType"]
  vital_params: ["HR", "NIDiasABP", "NIMAP", "NISysABP", "RespRate", "Temp", "SpO2"]
  lab_params: ["BUN", "Creatinine", "Glucose", "HCO3", "HCT", "K", "Lactate", "Mg", "Na", "Platelets", "WBC"]
  recent_hours: 24
  early_hours: 12

model:
  target: "In-hospital_death"
  test_size: 0.2
  random_state: 42
  models_to_train: ["logistic_regression", "random_forest", "xgboost"]
  best_model_metric: "recall"
  output_dir: "outputs/models"

tuning:
  enabled: true
  n_iter: 15
  cv: 5
  scoring: "recall"
  param_space:
    n_estimators: [100, 200, 300]
    max_depth: [3, 4, 5, 6]
    learning_rate: [0.01, 0.05, 0.1]
    subsample: [0.7, 0.8, 1.0]
    colsample_bytree: [0.7, 0.8, 1.0]

evaluation:
  output_dir: "outputs/evaluation"
  threshold_min: 0.1
  threshold_max: 0.9
  threshold_step: 0.05
  fbeta: 2
  # Ensemble: XGBoost primary + LR safety override
  ensemble:
    xgb_threshold_min: 0.20
    xgb_threshold_max: 0.30
    xgb_threshold_step: 0.02
    lr_threshold: 0.30

prediction:
  output_file: "outputs/predictions/predictions.csv"
  risk_thresholds:
    low: 0.3
    medium: 0.6

logging:
  log_dir: "logs"
  log_file: "pipeline.log"
  level: "INFO"
